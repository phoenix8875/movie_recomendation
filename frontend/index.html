<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Recommender</title>
<style>
  :root {
    --bg: #11131a;
    --panel: #1b1e29;
    --border: #2a2e3c;
    --text: #e8e8ee;
    --text-dim: #9498a8;
    --accent: #5b8cff;
    --accent-hover: #7aa0ff;
    --danger: #e25c5c;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  .container { max-width: 880px; margin: 0 auto; padding: 24px; }
  .hidden { display: none !important; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
  input[type=email], input[type=password], input[type=text] {
    width: 100%;
    padding: 9px 10px;
    background: #11131a;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 12px;
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
  }
  button:hover { background: var(--accent-hover); }
  button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.small { padding: 5px 10px; font-size: 12px; }
  .error { color: var(--danger); font-size: 13px; margin: 4px 0 12px; min-height: 16px; }
  .tag {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 16px;
    border: 1px solid var(--border);
    font-size: 13px;
    margin: 3px;
    cursor: pointer;
    user-select: none;
  }
  .tag.selected { background: var(--accent); border-color: var(--accent); color: white; }
  .movie-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .movie-info { flex: 1; }
  .poster {
    width: 46px;
    height: 69px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: #11131a;
  }
  .poster-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .movie-title { font-weight: 500; }
  .movie-meta { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  #user-email { color: var(--text-dim); font-size: 13px; margin-right: 12px; }
</style>
</head>
<body>

<header>
  <h1>Movie Recommender</h1>
  <div>
    <span id="user-email" class="hidden"></span>
    <button id="logout-btn" class="secondary small hidden">Log out</button>
  </div>
</header>

<div class="container">

  <!-- AUTH SECTION -->
  <div id="auth-section">
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Log in</button>
      <button class="tab-btn" data-tab="signup">Sign up</button>
    </div>

    <div class="panel" id="login-panel">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@example.com">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
      <div class="error" id="login-error"></div>
      <button id="login-btn">Log in</button>
    </div>

    <div class="panel hidden" id="signup-panel">
      <label for="signup-email">Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com">
      <label for="signup-password">Password (min 8 characters)</label>
      <input type="password" id="signup-password" placeholder="••••••••">
      <div class="error" id="signup-error"></div>
      <button id="signup-btn">Create account</button>
    </div>
  </div>

  <!-- APP SECTION (shown after login) -->
  <div id="app-section" class="hidden">

    <div class="panel">
      <h3>Get recommendations</h3>
      <label for="movie-search">Search for movies you like (type a title — press Enter or just click Recommend)</label>
      <input type="text" id="movie-search" placeholder="e.g. The Dark Knight">
      <div id="selected-movies"></div>

      <label style="margin-top:12px">Or pick genres you like</label>
      <div id="genre-tags"></div>

      <div style="margin-top:14px">
        <button id="recommend-btn">Recommend movies</button>
      </div>
    </div>

    <div class="panel hidden" id="results-panel">
      <h3>Recommended for you</h3>
      <div id="results-list"></div>
    </div>

    <div class="panel">
      <h3>Your watchlist</h3>
      <div id="watchlist-list"><span style="color:var(--text-dim)">Loading...</span></div>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
