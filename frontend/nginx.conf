server {
    listen 80;

    # Serve the static frontend (index.html, app.js) to the browser.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy all backend API routes to the backend container.
    #
    # Our FastAPI app exposes three top-level route prefixes — /auth, /movies,
    # and /watchlist — plus /health and /docs. Each location block below
    # forwards matching requests INTERNALLY to http://backend:8000 over
    # Docker's private network (the hostname "backend" resolves to the backend
    # container automatically, because docker-compose puts them on one network
    # and names them by service).
    #
    # The browser only ever talks to nginx on port 80. It never connects to
    # the backend directly — so the backend needs no public port at all.

    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /movies {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /watchlist {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://backend:8000;
    }

    # FastAPI's interactive API docs, handy for debugging.
    location /docs {
        proxy_pass http://backend:8000;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
    }
}
