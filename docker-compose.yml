services:
  # Database — internal only. No public port; only the backend talks to it,
  # over the private Docker network, by the hostname "db".
  db:
    image: postgres:16-alpine
    container_name: movie-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - movie_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend API — internal only. No public port. The browser never reaches
  # this directly; nginx (in the frontend container) reverse-proxies API
  # requests to it over the private network, by the hostname "backend".
  backend:
    build: ./backend
    container_name: movie-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      TMDB_API_KEY: ${TMDB_API_KEY}

  # Frontend + reverse proxy — the ONLY publicly exposed service.
  # Serves the static UI and proxies /auth, /movies, /watchlist to the backend.
  frontend:
    build: ./frontend
    container_name: movie-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  movie_db_data:
